<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diary Log</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --paper: #fffdf8;
      --paper-2: #ffffff;
      --text: #2f2a25;
      --muted: #7b7268;
      --line: #e3ddd4;
      --accent: #8a6f4d;
      --accent-dark: #6f5638;
      --danger: #b65a4a;
      --blue: #3d6c9e;
      --red: #a94d43;
      --post-mark: rgba(138, 111, 77, 0.22);
      --post-mark-strong: rgba(138, 111, 77, 0.62);
      --shadow: 0 8px 24px rgba(76, 61, 43, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Hiragino Sans",
        "Yu Gothic",
        sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 253, 248, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      max-width: 1160px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      line-height: 1.2;
    }

    .home-title-button {
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      color: var(--text);
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
    }

    .home-title-button:hover {
      color: var(--accent-dark);
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .sort-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .sort-select {
      border: 1px solid var(--line);
      background: var(--paper-2);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 999px;
      outline: none;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--paper-2);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 999px;
      transition: 0.15s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(76, 61, 43, 0.10);
    }

    .btn-primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
    }

    .btn-danger {
      border-color: #e2c8c2;
      color: var(--danger);
      background: #fff7f5;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 0.88rem;
    }

    .btn-plain {
      border: none;
      background: transparent;
      padding: 4px 6px;
      color: var(--muted);
      border-radius: 8px;
      font-size: 0.84rem;
    }

    .btn-plain:hover {
      background: #f0e8dc;
      transform: none;
      box-shadow: none;
    }

    .btn-plain:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 28px 20px 60px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 28px;
      align-items: start;
    }

    .main-column {
      min-width: 0;
    }

    .post-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .post-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .post-title {
      margin: 0 0 8px;
      font-size: 1.28rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 14px;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--accent-dark);
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 0.84rem;
    }

    .post-preview {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0 0 18px;
      color: #3c352e;
    }

    .post-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .empty-state {
      background: var(--paper);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      color: var(--muted);
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin: 20px 0 24px;
    }

    .page-button {
      min-width: 38px;
      border: 1px solid var(--line);
      background: var(--paper-2);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 10px;
    }

    .page-button.is-active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .page-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .page-ellipsis {
      color: var(--muted);
      padding: 0 3px;
    }

    .search-panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 20px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-input {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 11px 15px;
      color: var(--text);
      outline: none;
    }

    .search-input:focus,
    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(138, 111, 77, 0.16);
    }

    .filter-status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .side-column {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .side-box {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .side-box h2 {
      margin: 0 0 14px;
      font-size: 1.05rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .calendar-title {
      font-weight: 700;
      font-size: 0.98rem;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      text-align: center;
      font-size: 0.86rem;
    }

    .calendar-weekday {
      color: var(--muted);
      font-size: 0.78rem;
      padding: 4px 0;
    }

    .calendar-weekday.is-saturday {
      color: var(--blue);
    }

    .calendar-weekday.is-sunday {
      color: var(--red);
    }

    .calendar-day {
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      position: relative;
    }

    .calendar-day:hover {
      background: #f0e8dc;
    }

    .calendar-day.is-today {
      border-color: var(--accent);
      font-weight: 700;
    }

    .calendar-day.is-saturday {
      color: var(--blue);
      background: #f3f8fb;
    }

    .calendar-day.is-sunday {
      color: var(--red);
      background: #fff7f5;
    }

    .calendar-day.is-holiday {
      color: var(--red);
      background: #fff1ee;
      font-weight: 700;
    }

    /* 投稿済み日は、点ではなく「淡い囲い」で示す */
    .calendar-day.has-post {
      border-color: var(--post-mark-strong);
      box-shadow: inset 0 0 0 2px var(--post-mark);
      background-image: linear-gradient(0deg, rgba(138, 111, 77, 0.10), rgba(138, 111, 77, 0.10));
      font-weight: 700;
    }

    .calendar-day.has-post.is-saturday {
      background:
        linear-gradient(0deg, rgba(138, 111, 77, 0.12), rgba(138, 111, 77, 0.12)),
        #f3f8fb;
    }

    .calendar-day.has-post.is-sunday,
    .calendar-day.has-post.is-holiday {
      background:
        linear-gradient(0deg, rgba(138, 111, 77, 0.12), rgba(138, 111, 77, 0.12)),
        #fff1ee;
    }

    .calendar-day.is-empty {
      visibility: hidden;
    }

    .side-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .side-link {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border: none;
      background: transparent;
      color: var(--text);
      text-align: left;
      border-radius: 10px;
      padding: 8px 9px;
    }

    .side-link:hover,
    .side-link.is-active {
      background: #f0e8dc;
    }

    .category-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      border-radius: 10px;
    }

    .category-main {
      min-width: 0;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border: none;
      background: transparent;
      color: var(--text);
      text-align: left;
      border-radius: 10px;
      padding: 8px 9px;
    }

    .category-main:hover,
    .category-main.is-active {
      background: #f0e8dc;
    }

    .category-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category-tools {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .category-add {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .category-add input {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 11px;
      outline: none;
    }

    .side-note {
      color: var(--muted);
      font-size: 0.82rem;
      margin: 10px 0 0;
    }

    .count {
      color: var(--muted);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .backup-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-input {
      display: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(40, 32, 24, 0.45);
      padding: 20px;
    }

    .modal-backdrop.is-open {
      display: flex;
    }

    .modal {
      width: min(720px, 100%);
      max-height: min(90vh, 900px);
      overflow: auto;
      background: var(--paper);
      border-radius: 20px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
      border: 1px solid var(--line);
    }

    .modal-header {
      padding: 20px 22px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .modal-body {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .form-field label {
      font-weight: 700;
      font-size: 0.92rem;
    }

    .form-field small {
      color: var(--muted);
      font-weight: 400;
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 11px 12px;
      color: var(--text);
      outline: none;
    }

    .form-textarea {
      min-height: 260px;
      resize: vertical;
      line-height: 1.75;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      padding: 0 22px 22px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 200;
      background: #2f2a25;
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: 0.2s ease;
      font-size: 0.92rem;
      max-width: calc(100vw - 36px);
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 820px) {
      .container {
        grid-template-columns: 1fr;
      }

      .side-column {
        order: 2;
      }

      .main-column {
        order: 1;
      }

      .header-inner {
        align-items: flex-start;
      }

      .header-actions {
        width: 100%;
      }

      .header-actions .btn,
      .sort-control {
        flex: 1;
      }

      .sort-control {
        min-width: 210px;
      }

      .sort-select {
        width: 100%;
      }

      .search-row {
        flex-direction: column;
        align-items: stretch;
      }

      .post-card {
        padding: 18px;
      }
    }

    @media (max-width: 520px) {
      .container {
        padding: 20px 14px 46px;
      }

      .header-inner {
        padding: 16px 14px;
      }

      .home-title-button {
        font-size: 1.75rem;
      }

      .header-actions .btn,
      .sort-control {
        flex: 1 1 100%;
      }

      .modal-backdrop {
        padding: 10px;
        align-items: flex-end;
      }

      .modal {
        max-height: 94vh;
        border-radius: 18px 18px 0 0;
      }

      .form-textarea {
        min-height: 220px;
      }

      .category-row {
        grid-template-columns: 1fr;
      }

      .category-tools {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <h1>
          <button class="home-title-button" id="homeTitleButton" type="button">Diary Log</button>
        </h1>
        <p>思いついたときに書き残す、軽いログ型日記</p>
      </div>

      <div class="header-actions">
        <button class="btn btn-primary" id="newPostButton" type="button">新規投稿</button>

        <label class="sort-control">
          表示順
          <select class="sort-select" id="sortOrderSelect">
            <option value="newest">最新順</option>
            <option value="oldest">古い順</option>
          </select>
        </label>
      </div>
    </div>
  </header>

  <div class="container">
    <main class="main-column">
      <section class="post-list" id="postList"></section>

      <nav class="pagination" id="pagination" aria-label="ページ切り替え"></nav>

      <section class="search-panel">
        <div class="search-row">
          <input
            class="search-input"
            id="searchInput"
            type="search"
            placeholder="タイトル・本文・カテゴリを検索"
            autocomplete="off"
          />
          <button class="btn" id="clearFilterButton" type="button">絞り込み解除</button>
        </div>
        <div class="filter-status" id="filterStatus"></div>
      </section>
    </main>

    <aside class="side-column">
      <section class="side-box">
        <h2>カレンダー</h2>
        <div class="calendar-header">
          <button class="btn btn-small" id="prevMonthButton" type="button">前月</button>
          <div class="calendar-title" id="calendarTitle"></div>
          <button class="btn btn-small" id="nextMonthButton" type="button">翌月</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <section class="side-box">
        <h2>カテゴリ</h2>
        <div class="side-list" id="categoryList"></div>

        <div class="category-add">
          <input id="newCategoryInput" type="text" placeholder="カテゴリを追加" />
          <button class="btn btn-small" id="addCategoryButton" type="button">追加</button>
        </div>

        <p class="side-note">「未分類」は削除・名称変更できません。カテゴリを削除すると、そのカテゴリの投稿は未分類に戻ります。</p>
      </section>

      <section class="side-box">
        <h2>アーカイブ</h2>
        <div class="side-list" id="archiveList"></div>
      </section>

      <section class="side-box">
        <h2>バックアップ</h2>
        <div class="backup-actions">
          <button class="btn" id="exportJsonButton" type="button">JSONエクスポート</button>
          <button class="btn" id="importJsonButton" type="button">JSONインポート</button>
          <button class="btn" id="exportTextButton" type="button">テキスト書き出し</button>
          <input class="file-input" type="file" id="importFileInput" accept="application/json,.json" />
        </div>
      </section>
    </aside>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">新規投稿</h2>
        <button class="btn btn-small" id="closeModalButton" type="button">閉じる</button>
      </div>

      <form id="postForm">
        <div class="modal-body">
          <div class="form-field">
            <label for="bodyInput">本文 <small>必須</small></label>
            <textarea
              class="form-textarea"
              id="bodyInput"
              placeholder="ここに書きたいことをそのまま入力してください。"
            ></textarea>
          </div>

          <div class="form-field">
            <label for="titleInput">タイトル <small>任意</small></label>
            <input
              class="form-input"
              id="titleInput"
              type="text"
              placeholder="あとから付けても大丈夫です"
            />
          </div>

          <div class="form-field">
            <label for="categoryInput">カテゴリ <small>任意</small></label>
            <select class="form-select" id="categoryInput"></select>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn" type="button" id="cancelButton">キャンセル</button>
          <button class="btn btn-primary" type="submit" id="saveButton">投稿</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    "use strict";

    const STORAGE_KEY = "diary-log-posts-v1";
    const CATEGORY_STORAGE_KEY = "diary-log-categories-v1";
    const SETTINGS_STORAGE_KEY = "diary-log-settings-v1";
    const DEFAULT_CATEGORY = "未分類";
    const POSTS_PER_PAGE = 10;

    let posts = [];
    let categories = [DEFAULT_CATEGORY];
    let editingId = null;

    const filterState = {
      search: "",
      date: "",
      category: "",
      month: ""
    };

    const viewState = {
      currentPage: 1,
      sortOrder: "newest"
    };

    const calendarState = {
      year: new Date().getFullYear(),
      month: new Date().getMonth()
    };

    const homeTitleButton = document.getElementById("homeTitleButton");
    const postList = document.getElementById("postList");
    const pagination = document.getElementById("pagination");
    const searchInput = document.getElementById("searchInput");
    const clearFilterButton = document.getElementById("clearFilterButton");
    const filterStatus = document.getElementById("filterStatus");

    const newPostButton = document.getElementById("newPostButton");
    const sortOrderSelect = document.getElementById("sortOrderSelect");

    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const closeModalButton = document.getElementById("closeModalButton");
    const cancelButton = document.getElementById("cancelButton");
    const postForm = document.getElementById("postForm");
    const bodyInput = document.getElementById("bodyInput");
    const titleInput = document.getElementById("titleInput");
    const categoryInput = document.getElementById("categoryInput");

    const calendarTitle = document.getElementById("calendarTitle");
    const calendarGrid = document.getElementById("calendarGrid");
    const prevMonthButton = document.getElementById("prevMonthButton");
    const nextMonthButton = document.getElementById("nextMonthButton");

    const categoryList = document.getElementById("categoryList");
    const newCategoryInput = document.getElementById("newCategoryInput");
    const addCategoryButton = document.getElementById("addCategoryButton");

    const archiveList = document.getElementById("archiveList");

    const exportJsonButton = document.getElementById("exportJsonButton");
    const importJsonButton = document.getElementById("importJsonButton");
    const importFileInput = document.getElementById("importFileInput");
    const exportTextButton = document.getElementById("exportTextButton");
    const toast = document.getElementById("toast");

    loadSettings();
    loadCategories();
    loadPosts();
    syncCategoriesFromPosts();
    saveCategories();
    renderAll();

    homeTitleButton.onclick = goHome;
    newPostButton.onclick = function () {
      openModal();
    };

    closeModalButton.onclick = closeModal;
    cancelButton.onclick = closeModal;

    modalBackdrop.onclick = function (event) {
      if (event.target === modalBackdrop) {
        closeModal();
      }
    };

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && modalBackdrop.classList.contains("is-open")) {
        closeModal();
      }
    });

    postForm.onsubmit = handleSavePost;

    sortOrderSelect.onchange = function () {
      viewState.sortOrder = sortOrderSelect.value === "oldest" ? "oldest" : "newest";
      viewState.currentPage = 1;
      saveSettings();
      renderPosts();
      renderPagination();
      renderFilterStatus();
    };

    searchInput.oninput = function () {
      filterState.search = searchInput.value.trim();
      viewState.currentPage = 1;
      renderPosts();
      renderPagination();
      renderFilterStatus();
    };

    clearFilterButton.onclick = clearFilters;

    prevMonthButton.onclick = function () {
      calendarState.month -= 1;
      if (calendarState.month < 0) {
        calendarState.month = 11;
        calendarState.year -= 1;
      }
      renderCalendar();
    };

    nextMonthButton.onclick = function () {
      calendarState.month += 1;
      if (calendarState.month > 11) {
        calendarState.month = 0;
        calendarState.year += 1;
      }
      renderCalendar();
    };

    addCategoryButton.onclick = addCategory;

    newCategoryInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        addCategory();
      }
    });

    exportJsonButton.onclick = exportJson;

    importJsonButton.onclick = function () {
      importFileInput.click();
    };

    importFileInput.onchange = importJson;
    exportTextButton.onclick = exportText;

    function goHome() {
      filterState.search = "";
      filterState.date = "";
      filterState.category = "";
      filterState.month = "";
      searchInput.value = "";
      viewState.currentPage = 1;

      const now = new Date();
      calendarState.year = now.getFullYear();
      calendarState.month = now.getMonth();

      renderAll();
      showToast("全件表示に戻しました。");
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
        if (!raw) return;

        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return;

        if (parsed.sortOrder === "oldest" || parsed.sortOrder === "newest") {
          viewState.sortOrder = parsed.sortOrder;
        }
      } catch (error) {
        console.warn("設定の読み込みに失敗しました。", error);
      }

      sortOrderSelect.value = viewState.sortOrder;
    }

    function saveSettings() {
      try {
        localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify({
          sortOrder: viewState.sortOrder
        }));
      } catch (error) {
        console.warn("設定の保存に失敗しました。", error);
      }
    }

    function loadCategories() {
      try {
        const raw = localStorage.getItem(CATEGORY_STORAGE_KEY);
        if (!raw) {
          categories = [DEFAULT_CATEGORY];
          return;
        }

        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          categories = [DEFAULT_CATEGORY];
          return;
        }

        categories = normalizeCategories(parsed);
      } catch (error) {
        console.warn("カテゴリの読み込みに失敗しました。", error);
        categories = [DEFAULT_CATEGORY];
      }
    }

    function saveCategories() {
      try {
        localStorage.setItem(CATEGORY_STORAGE_KEY, JSON.stringify(categories));
      } catch (error) {
        console.warn("カテゴリの保存に失敗しました。", error);
      }
    }

    function loadPosts() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          posts = [];
          return;
        }

        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          posts = [];
          return;
        }

        posts = parsed
          .filter(isValidPost)
          .map(normalizePost);
      } catch (error) {
        console.warn("localStorageの読み込みに失敗しました。", error);
        posts = [];
        showToast("保存データの読み込みに失敗しました。空の状態で起動します。");
      }
    }

    function savePosts() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
      } catch (error) {
        console.error("localStorageへの保存に失敗しました。", error);
        alert("保存に失敗しました。ブラウザの保存容量が不足している可能性があります。");
      }
    }

    function syncCategoriesFromPosts() {
      const postCategories = posts
        .map(function (post) {
          return post.category;
        })
        .filter(function (category) {
          return typeof category === "string" && category.trim();
        });

      categories = normalizeCategories(categories.concat(postCategories));
    }

    function openModal(postId) {
      editingId = postId || null;
      renderCategorySelect();

      if (editingId) {
        const post = posts.find(function (item) {
          return item.id === editingId;
        });

        if (!post) return;

        modalTitle.textContent = "投稿を編集";
        bodyInput.value = post.body;
        titleInput.value = post.title;

        if (!categories.includes(post.category)) {
          categories.push(post.category);
          categories = normalizeCategories(categories);
          saveCategories();
          renderCategorySelect();
        }

        categoryInput.value = post.category || DEFAULT_CATEGORY;
      } else {
        modalTitle.textContent = "新規投稿";
        bodyInput.value = "";
        titleInput.value = "";
        categoryInput.value = DEFAULT_CATEGORY;
      }

      modalBackdrop.classList.add("is-open");
      modalBackdrop.setAttribute("aria-hidden", "false");

      setTimeout(function () {
        bodyInput.focus();
      }, 0);
    }

    function closeModal() {
      modalBackdrop.classList.remove("is-open");
      modalBackdrop.setAttribute("aria-hidden", "true");
      editingId = null;
      postForm.reset();
    }

    function handleSavePost(event) {
      event.preventDefault();

      const body = bodyInput.value.trim();
      const title = titleInput.value.trim();
      const selectedCategory = categoryInput.value.trim();
      const category = categories.includes(selectedCategory) ? selectedCategory : DEFAULT_CATEGORY;

      if (!body) {
        alert("本文を入力してください。");
        bodyInput.focus();
        return;
      }

      const now = new Date().toISOString();

      if (editingId) {
        const index = posts.findIndex(function (item) {
          return item.id === editingId;
        });

        if (index === -1) return;

        posts[index] = {
          ...posts[index],
          updatedAt: now,
          title,
          body,
          category
        };

        showToast("投稿を更新しました。");
      } else {
        const newPost = {
          id: createId(),
          createdAt: now,
          updatedAt: now,
          title,
          body,
          category
        };

        posts.unshift(newPost);
        viewState.currentPage = 1;
        showToast("投稿しました。");
      }

      savePosts();
      closeModal();
      renderAll();
    }

    function deletePost(postId) {
      const post = posts.find(function (item) {
        return item.id === postId;
      });

      if (!post) {
        alert("削除対象の投稿が見つかりません。");
        return;
      }

      const heading = getHeading(post);
      const ok = confirm("この投稿を削除しますか？\n\n" + heading);

      if (!ok) return;

      posts = posts.filter(function (item) {
        return item.id !== postId;
      });

      savePosts();
      adjustCurrentPage();
      renderAll();
      showToast("投稿を削除しました。");
    }

    function addCategory() {
      const name = sanitizeCategoryName(newCategoryInput.value);

      if (!name) {
        alert("カテゴリ名を入力してください。");
        newCategoryInput.focus();
        return;
      }

      if (categories.includes(name)) {
        alert("同じ名前のカテゴリがすでにあります。");
        newCategoryInput.focus();
        return;
      }

      categories.push(name);
      categories = normalizeCategories(categories);
      saveCategories();

      newCategoryInput.value = "";
      renderCategories();
      renderCategorySelect();
      showToast("カテゴリを追加しました。");
    }

    function filterByCategory(categoryName) {
      filterState.category = categoryName;
      filterState.date = "";
      filterState.month = "";
      viewState.currentPage = 1;

      renderPosts();
      renderPagination();
      renderCategories();
      renderArchives();
      renderFilterStatus();
    }

    function renameCategory(oldName) {
      if (oldName === DEFAULT_CATEGORY) {
        alert("未分類は名称変更できません。");
        return;
      }

      const input = prompt("新しいカテゴリ名を入力してください。", oldName);
      if (input === null) return;

      const newName = sanitizeCategoryName(input);

      if (!newName) {
        alert("カテゴリ名を空にはできません。");
        return;
      }

      if (newName === oldName) return;

      if (categories.includes(newName)) {
        alert("同じ名前のカテゴリがすでにあります。");
        return;
      }

      categories = categories.map(function (category) {
        return category === oldName ? newName : category;
      });

      posts = posts.map(function (post) {
        if (post.category !== oldName) return post;

        return {
          ...post,
          category: newName,
          updatedAt: new Date().toISOString()
        };
      });

      if (filterState.category === oldName) {
        filterState.category = newName;
      }

      saveCategories();
      savePosts();
      renderAll();
      showToast("カテゴリ名を変更しました。");
    }

    function deleteCategory(categoryName) {
      if (categoryName === DEFAULT_CATEGORY) {
        alert("未分類は削除できません。");
        return;
      }

      const count = posts.filter(function (post) {
        return post.category === categoryName;
      }).length;

      const ok = confirm(
        "カテゴリ「" + categoryName + "」を削除しますか？\n\n" +
        "このカテゴリの投稿 " + count + "件は「未分類」に戻ります。"
      );

      if (!ok) return;

      categories = categories.filter(function (category) {
        return category !== categoryName;
      });

      posts = posts.map(function (post) {
        if (post.category !== categoryName) return post;

        return {
          ...post,
          category: DEFAULT_CATEGORY,
          updatedAt: new Date().toISOString()
        };
      });

      if (filterState.category === categoryName) {
        filterState.category = "";
      }

      saveCategories();
      savePosts();
      renderAll();
      showToast("カテゴリを削除しました。");
    }

    function sanitizeCategoryName(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, " ")
        .slice(0, 30);
    }

    function normalizeCategories(values) {
      const result = [DEFAULT_CATEGORY];

      values.forEach(function (value) {
        const name = sanitizeCategoryName(value);
        if (!name) return;
        if (name === DEFAULT_CATEGORY) return;
        if (result.includes(name)) return;
        result.push(name);
      });

      return result;
    }

    function copyPost(post) {
      const lines = [];

      lines.push("日時: " + formatDateTime(post.createdAt));
      lines.push("カテゴリ: " + (post.category || DEFAULT_CATEGORY));
      lines.push("タイトル: " + (post.title || "（無題）"));
      lines.push("");
      lines.push(post.body || "");

      copyText(lines.join("\n"));
    }

    function copyText(text) {
      if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        navigator.clipboard.writeText(text)
          .then(function () {
            showToast("投稿をコピーしました。");
          })
          .catch(function () {
            fallbackCopyText(text);
          });
        return;
      }

      fallbackCopyText(text);
    }

    function fallbackCopyText(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      textarea.style.top = "0";

      document.body.appendChild(textarea);
      textarea.select();

      try {
        const ok = document.execCommand("copy");
        showToast(ok ? "投稿をコピーしました。" : "コピーに失敗しました。");
      } catch (error) {
        console.warn("コピーに失敗しました。", error);
        alert("コピーに失敗しました。本文を手動で選択してください。");
      } finally {
        document.body.removeChild(textarea);
      }
    }

    function renderAll() {
      renderCategorySelect();
      renderPosts();
      renderPagination();
      renderCalendar();
      renderCategories();
      renderArchives();
      renderFilterStatus();
    }

    function renderPosts() {
      clearElement(postList);

      const allVisiblePosts = getFilteredPosts();
      adjustCurrentPage(allVisiblePosts.length);

      const start = (viewState.currentPage - 1) * POSTS_PER_PAGE;
      const pagePosts = allVisiblePosts.slice(start, start + POSTS_PER_PAGE);

      if (pagePosts.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = posts.length === 0
          ? "まだ投稿がありません。「新規投稿」から書き始められます。"
          : "条件に一致する投稿がありません。";
        postList.appendChild(empty);
        return;
      }

      pagePosts.forEach(function (post) {
        const card = document.createElement("article");
        card.className = "post-card";

        const title = document.createElement("h2");
        title.className = "post-title";
        title.textContent = getHeading(post);

        const meta = document.createElement("div");
        meta.className = "post-meta";

        const date = document.createElement("span");
        date.textContent = formatDateTime(post.createdAt);

        const category = document.createElement("span");
        category.className = "category-badge";
        category.textContent = post.category || DEFAULT_CATEGORY;

        const updated = document.createElement("span");
        updated.textContent = post.updatedAt !== post.createdAt
          ? "更新: " + formatDateTime(post.updatedAt)
          : "";

        meta.appendChild(date);
        meta.appendChild(category);
        if (updated.textContent) meta.appendChild(updated);

        const preview = document.createElement("p");
        preview.className = "post-preview";
        preview.textContent = createPreview(post.body, 220);

        const actions = document.createElement("div");
        actions.className = "post-actions";

        const copyButton = document.createElement("button");
        copyButton.className = "btn btn-small";
        copyButton.type = "button";
        copyButton.textContent = "コピー";
        copyButton.onclick = function () {
          copyPost(post);
        };

        const editButton = document.createElement("button");
        editButton.className = "btn btn-small";
        editButton.type = "button";
        editButton.textContent = "編集";
        editButton.onclick = function () {
          openModal(post.id);
        };

        const deleteButton = document.createElement("button");
        deleteButton.className = "btn btn-small btn-danger";
        deleteButton.type = "button";
        deleteButton.textContent = "削除";
        deleteButton.onclick = function () {
          deletePost(post.id);
        };

        actions.appendChild(copyButton);
        actions.appendChild(editButton);
        actions.appendChild(deleteButton);

        card.appendChild(title);
        card.appendChild(meta);
        card.appendChild(preview);
        card.appendChild(actions);

        postList.appendChild(card);
      });
    }

    function renderPagination() {
      clearElement(pagination);

      const total = getFilteredPosts().length;
      const totalPages = Math.max(1, Math.ceil(total / POSTS_PER_PAGE));

      if (totalPages <= 1) return;

      const prev = document.createElement("button");
      prev.className = "page-button";
      prev.type = "button";
      prev.textContent = "前へ";
      prev.disabled = viewState.currentPage <= 1;
      prev.onclick = function () {
        if (viewState.currentPage <= 1) return;
        viewState.currentPage -= 1;
        renderPosts();
        renderPagination();
        renderFilterStatus();
        scrollToTopOfPosts();
      };
      pagination.appendChild(prev);

      getPageNumbers(totalPages).forEach(function (item) {
        if (item === "...") {
          const ellipsis = document.createElement("span");
          ellipsis.className = "page-ellipsis";
          ellipsis.textContent = "…";
          pagination.appendChild(ellipsis);
          return;
        }

        const button = document.createElement("button");
        button.className = "page-button";
        button.type = "button";
        button.textContent = String(item);

        if (item === viewState.currentPage) {
          button.classList.add("is-active");
        }

        button.onclick = function () {
          viewState.currentPage = item;
          renderPosts();
          renderPagination();
          renderFilterStatus();
          scrollToTopOfPosts();
        };

        pagination.appendChild(button);
      });

      const next = document.createElement("button");
      next.className = "page-button";
      next.type = "button";
      next.textContent = "次へ";
      next.disabled = viewState.currentPage >= totalPages;
      next.onclick = function () {
        if (viewState.currentPage >= totalPages) return;
        viewState.currentPage += 1;
        renderPosts();
        renderPagination();
        renderFilterStatus();
        scrollToTopOfPosts();
      };
      pagination.appendChild(next);
    }

    function getPageNumbers(totalPages) {
      const current = viewState.currentPage;
      const pages = [];

      if (totalPages <= 7) {
        for (let i = 1; i <= totalPages; i += 1) {
          pages.push(i);
        }
        return pages;
      }

      pages.push(1);

      if (current > 4) {
        pages.push("...");
      }

      const start = Math.max(2, current - 1);
      const end = Math.min(totalPages - 1, current + 1);

      for (let i = start; i <= end; i += 1) {
        pages.push(i);
      }

      if (current < totalPages - 3) {
        pages.push("...");
      }

      pages.push(totalPages);

      return pages;
    }

    function adjustCurrentPage(totalCount) {
      const count = typeof totalCount === "number" ? totalCount : getFilteredPosts().length;
      const totalPages = Math.max(1, Math.ceil(count / POSTS_PER_PAGE));

      if (viewState.currentPage > totalPages) {
        viewState.currentPage = totalPages;
      }

      if (viewState.currentPage < 1) {
        viewState.currentPage = 1;
      }
    }

    function scrollToTopOfPosts() {
      postList.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function renderCalendar() {
      clearElement(calendarGrid);

      const year = calendarState.year;
      const month = calendarState.month;
      const holidays = getJapaneseHolidays(year);

      calendarTitle.textContent = year + "年" + (month + 1) + "月";

      const weekdays = ["月", "火", "水", "木", "金", "土", "日"];

      weekdays.forEach(function (weekday, index) {
        const cell = document.createElement("div");
        cell.className = "calendar-weekday";
        if (index === 5) cell.classList.add("is-saturday");
        if (index === 6) cell.classList.add("is-sunday");
        cell.textContent = weekday;
        calendarGrid.appendChild(cell);
      });

      const firstDate = new Date(year, month, 1);
      const lastDate = new Date(year, month + 1, 0);
      const startOffset = (firstDate.getDay() + 6) % 7;
      const daysInMonth = lastDate.getDate();

      for (let i = 0; i < startOffset; i += 1) {
        const empty = document.createElement("button");
        empty.className = "calendar-day is-empty";
        empty.type = "button";
        empty.tabIndex = -1;
        calendarGrid.appendChild(empty);
      }

      const todayKey = toDateKey(new Date());

      for (let day = 1; day <= daysInMonth; day += 1) {
        const date = new Date(year, month, day);
        const dateKey = toDateKey(date);
        const dayOfWeek = date.getDay();
        const holidayName = holidays.get(dateKey);

        const button = document.createElement("button");
        button.className = "calendar-day";
        button.type = "button";
        button.textContent = String(day);

        if (dateKey === todayKey) {
          button.classList.add("is-today");
        }

        if (dayOfWeek === 6) {
          button.classList.add("is-saturday");
        }

        if (dayOfWeek === 0) {
          button.classList.add("is-sunday");
        }

        if (holidayName) {
          button.classList.add("is-holiday");
          button.title = holidayName;
        }

        const hasPost = posts.some(function (post) {
          return toDateKey(new Date(post.createdAt)) === dateKey;
        });

        if (hasPost) {
          button.classList.add("has-post");
          button.title = button.title ? button.title + " / 投稿あり" : "投稿あり";
        }

        button.onclick = function () {
          filterState.date = dateKey;
          filterState.category = "";
          filterState.month = "";
          viewState.currentPage = 1;
          renderPosts();
          renderPagination();
          renderCategories();
          renderArchives();
          renderFilterStatus();
        };

        calendarGrid.appendChild(button);
      }
    }

    function renderCategories() {
      clearElement(categoryList);

      categories.forEach(function (categoryName) {
        const row = document.createElement("div");
        row.className = "category-row";

        const mainButton = document.createElement("button");
        mainButton.className = "category-main";
        mainButton.type = "button";

        if (filterState.category === categoryName) {
          mainButton.classList.add("is-active");
        }

        mainButton.onclick = function () {
          filterByCategory(categoryName);
        };

        const label = document.createElement("span");
        label.className = "category-name";
        label.textContent = categoryName;

        const count = document.createElement("span");
        count.className = "count";
        count.textContent = String(posts.filter(function (post) {
          return post.category === categoryName;
        }).length);

        mainButton.appendChild(label);
        mainButton.appendChild(count);

        const tools = document.createElement("div");
        tools.className = "category-tools";

        const renameButton = document.createElement("button");
        renameButton.className = "btn-plain";
        renameButton.type = "button";
        renameButton.textContent = "変更";
        renameButton.disabled = categoryName === DEFAULT_CATEGORY;
        renameButton.onclick = function () {
          renameCategory(categoryName);
        };

        const deleteButton = document.createElement("button");
        deleteButton.className = "btn-plain";
        deleteButton.type = "button";
        deleteButton.textContent = "削除";
        deleteButton.disabled = categoryName === DEFAULT_CATEGORY;
        deleteButton.onclick = function () {
          deleteCategory(categoryName);
        };

        tools.appendChild(renameButton);
        tools.appendChild(deleteButton);

        row.appendChild(mainButton);
        row.appendChild(tools);

        categoryList.appendChild(row);
      });
    }

    function renderCategorySelect() {
      clearElement(categoryInput);

      categories.forEach(function (categoryName) {
        const option = document.createElement("option");
        option.value = categoryName;
        option.textContent = categoryName;
        categoryInput.appendChild(option);
      });

      if (!categoryInput.value) {
        categoryInput.value = DEFAULT_CATEGORY;
      }
    }

    function renderArchives() {
      clearElement(archiveList);

      const monthMap = new Map();

      posts.forEach(function (post) {
        const date = new Date(post.createdAt);
        const key = toMonthKey(date);
        monthMap.set(key, (monthMap.get(key) || 0) + 1);
      });

      const keys = Array.from(monthMap.keys()).sort().reverse();

      if (keys.length === 0) {
        const empty = document.createElement("div");
        empty.className = "count";
        empty.textContent = "まだ投稿がありません";
        archiveList.appendChild(empty);
        return;
      }

      keys.forEach(function (key) {
        const button = document.createElement("button");
        button.className = "side-link";
        button.type = "button";

        if (filterState.month === key) {
          button.classList.add("is-active");
        }

        const label = document.createElement("span");
        label.textContent = formatMonthKey(key);

        const count = document.createElement("span");
        count.className = "count";
        count.textContent = String(monthMap.get(key));

        button.appendChild(label);
        button.appendChild(count);

        button.onclick = function () {
          filterState.month = key;
          filterState.date = "";
          filterState.category = "";
          viewState.currentPage = 1;
          renderPosts();
          renderPagination();
          renderCategories();
          renderArchives();
          renderFilterStatus();
        };

        archiveList.appendChild(button);
      });
    }

    function renderFilterStatus() {
      clearElement(filterStatus);

      const parts = [];

      if (filterState.search) {
        parts.push("検索: " + filterState.search);
      }

      if (filterState.date) {
        parts.push("日付: " + formatDateKey(filterState.date));
      }

      if (filterState.category) {
        parts.push("カテゴリ: " + filterState.category);
      }

      if (filterState.month) {
        parts.push("アーカイブ: " + formatMonthKey(filterState.month));
      }

      const visibleCount = getFilteredPosts().length;
      const totalCount = posts.length;
      const totalPages = Math.max(1, Math.ceil(visibleCount / POSTS_PER_PAGE));
      const orderText = viewState.sortOrder === "oldest" ? "古い順" : "最新順";

      const statusText = document.createElement("span");

      if (parts.length === 0) {
        statusText.textContent =
          "全件表示中：" + visibleCount + "件 / " +
          orderText + " / " +
          viewState.currentPage + "ページ目（全" + totalPages + "ページ）";
      } else {
        statusText.textContent =
          parts.join(" / ") + " / 表示：" + visibleCount + "件（全" + totalCount + "件） / " +
          orderText + " / " +
          viewState.currentPage + "ページ目（全" + totalPages + "ページ）";
      }

      filterStatus.appendChild(statusText);
    }

    function getFilteredPosts() {
      const search = filterState.search.toLowerCase();

      return posts
        .slice()
        .sort(function (a, b) {
          const diff = new Date(a.createdAt) - new Date(b.createdAt);
          return viewState.sortOrder === "oldest" ? diff : -diff;
        })
        .filter(function (post) {
          if (filterState.date) {
            const postDate = toDateKey(new Date(post.createdAt));
            if (postDate !== filterState.date) return false;
          }

          if (filterState.category) {
            if (post.category !== filterState.category) return false;
          }

          if (filterState.month) {
            const postMonth = toMonthKey(new Date(post.createdAt));
            if (postMonth !== filterState.month) return false;
          }

          if (search) {
            const target = [
              post.title,
              post.body,
              post.category
            ].join(" ").toLowerCase();

            if (!target.includes(search)) return false;
          }

          return true;
        });
    }

    function clearFilters() {
      filterState.search = "";
      filterState.date = "";
      filterState.category = "";
      filterState.month = "";
      searchInput.value = "";
      viewState.currentPage = 1;
      renderAll();
    }

    function exportJson() {
      const backup = {
        app: "diary-log",
        version: 2,
        exportedAt: new Date().toISOString(),
        categories,
        posts
      };

      const data = JSON.stringify(backup, null, 2);
      const filename = "diary-log-backup-" + toDateKey(new Date()) + ".json";
      downloadFile(filename, data, "application/json");
      showToast("JSONを書き出しました。");
    }

    function importJson(event) {
      const file = event.target.files[0];
      if (!file) return;

      const ok = confirm(
        "JSONをインポートします。\n\n現在の投稿データとカテゴリは、インポートした内容で置き換えられます。\n事前にJSONエクスポートしておくと安全です。\n\n続行しますか？"
      );

      if (!ok) {
        importFileInput.value = "";
        return;
      }

      const reader = new FileReader();

      reader.onload = function () {
        try {
          const parsed = JSON.parse(String(reader.result));

          let importedPosts = [];
          let importedCategories = [DEFAULT_CATEGORY];

          if (Array.isArray(parsed)) {
            importedPosts = parsed;
          } else if (parsed && typeof parsed === "object" && Array.isArray(parsed.posts)) {
            importedPosts = parsed.posts;

            if (Array.isArray(parsed.categories)) {
              importedCategories = parsed.categories;
            }
          } else {
            alert("インポートできません。JSONの形式が正しくありません。");
            return;
          }

          const validPosts = importedPosts.filter(isValidPost).map(normalizePost);

          if (validPosts.length !== importedPosts.length) {
            const proceed = confirm(
              "一部のデータ形式が正しくありません。\n\n有効な投稿のみインポートします。\n有効件数: " + validPosts.length + "件\n元データ件数: " + importedPosts.length + "件\n\n続行しますか？"
            );

            if (!proceed) return;
          }

          posts = validPosts;
          categories = normalizeCategories(importedCategories);
          syncCategoriesFromPosts();

          savePosts();
          saveCategories();
          clearFilters();
          showToast("JSONをインポートしました。");
        } catch (error) {
          console.error(error);
          alert("JSONの読み込みに失敗しました。ファイル形式を確認してください。");
        } finally {
          importFileInput.value = "";
        }
      };

      reader.onerror = function () {
        alert("ファイルの読み込みに失敗しました。");
        importFileInput.value = "";
      };

      reader.readAsText(file, "utf-8");
    }

    function exportText() {
      const sortedPosts = getSortedAllPosts();
      const lines = [];

      lines.push("Diary Log 書き出し");
      lines.push("書き出し日時: " + formatDateTime(new Date().toISOString()));
      lines.push("投稿数: " + sortedPosts.length + "件");
      lines.push("表示順: " + (viewState.sortOrder === "oldest" ? "古い順" : "最新順"));
      lines.push("");

      sortedPosts.forEach(function (post, index) {
        lines.push("========================================");
        lines.push((index + 1) + ". " + formatDateTime(post.createdAt));
        lines.push("カテゴリ: " + (post.category || DEFAULT_CATEGORY));
        lines.push("タイトル: " + (post.title || "（無題）"));
        if (post.updatedAt && post.updatedAt !== post.createdAt) {
          lines.push("更新日時: " + formatDateTime(post.updatedAt));
        }
        lines.push("----------------------------------------");
        lines.push(post.body || "");
        lines.push("");
      });

      const filename = "diary-log-text-" + toDateKey(new Date()) + ".txt";
      downloadFile(filename, lines.join("\n"), "text/plain");
      showToast("テキストを書き出しました。");
    }

    function getSortedAllPosts() {
      return posts
        .slice()
        .sort(function (a, b) {
          const diff = new Date(a.createdAt) - new Date(b.createdAt);
          return viewState.sortOrder === "oldest" ? diff : -diff;
        });
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType + ";charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();

      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function isValidPost(value) {
      if (!value || typeof value !== "object") return false;

      const hasRequiredFields =
        typeof value.id === "string" &&
        typeof value.createdAt === "string" &&
        typeof value.updatedAt === "string" &&
        typeof value.title === "string" &&
        typeof value.body === "string" &&
        typeof value.category === "string";

      if (!hasRequiredFields) return false;
      if (Number.isNaN(new Date(value.createdAt).getTime())) return false;
      if (Number.isNaN(new Date(value.updatedAt).getTime())) return false;

      return true;
    }

    function normalizePost(post) {
      const category = sanitizeCategoryName(post.category) || DEFAULT_CATEGORY;

      return {
        id: post.id,
        createdAt: post.createdAt,
        updatedAt: post.updatedAt,
        title: post.title || "",
        body: post.body || "",
        category
      };
    }

    function getJapaneseHolidays(year) {
      const holidays = new Map();

      function add(month, day, name) {
        holidays.set(toDateKey(new Date(year, month - 1, day)), name);
      }

      function addNthMonday(month, nth, name) {
        const date = nthWeekdayOfMonth(year, month, 1, nth);
        add(month, date.getDate(), name);
      }

      add(1, 1, "元日");
      addNthMonday(1, 2, "成人の日");
      add(2, 11, "建国記念の日");

      if (year >= 2020) {
        add(2, 23, "天皇誕生日");
      }

      add(3, springEquinoxDay(year), "春分の日");
      add(4, 29, "昭和の日");
      add(5, 3, "憲法記念日");
      add(5, 4, "みどりの日");
      add(5, 5, "こどもの日");
      addNthMonday(7, 3, "海の日");

      if (year >= 2016) {
        add(8, 11, "山の日");
      }

      addNthMonday(9, 3, "敬老の日");
      add(9, autumnEquinoxDay(year), "秋分の日");
      addNthMonday(10, 2, year >= 2020 ? "スポーツの日" : "体育の日");
      add(11, 3, "文化の日");
      add(11, 23, "勤労感謝の日");

      addSubstituteHolidays(year, holidays);
      addCitizenHolidays(year, holidays);

      return holidays;
    }

    function addSubstituteHolidays(year, holidays) {
      const keys = Array.from(holidays.keys()).sort();

      keys.forEach(function (key) {
        const date = parseDateKey(key);

        if (date.getDay() !== 0) return;

        let next = new Date(date);
        next.setDate(next.getDate() + 1);

        while (next.getFullYear() === year && holidays.has(toDateKey(next))) {
          next.setDate(next.getDate() + 1);
        }

        if (next.getFullYear() === year) {
          holidays.set(toDateKey(next), "振替休日");
        }
      });
    }

    function addCitizenHolidays(year, holidays) {
      const start = new Date(year, 0, 1);
      const end = new Date(year, 11, 31);

      for (let date = new Date(start); date <= end; date.setDate(date.getDate() + 1)) {
        const key = toDateKey(date);

        if (holidays.has(key)) continue;
        if (date.getDay() === 0 || date.getDay() === 6) continue;

        const prev = new Date(date);
        prev.setDate(prev.getDate() - 1);

        const next = new Date(date);
        next.setDate(next.getDate() + 1);

        if (holidays.has(toDateKey(prev)) && holidays.has(toDateKey(next))) {
          holidays.set(key, "国民の休日");
        }
      }
    }

    function nthWeekdayOfMonth(year, month, weekday, nth) {
      const date = new Date(year, month - 1, 1);
      const offset = (weekday - date.getDay() + 7) % 7;
      date.setDate(1 + offset + (nth - 1) * 7);
      return date;
    }

    function springEquinoxDay(year) {
      if (year >= 1980 && year <= 2099) {
        return Math.floor(20.8431 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
      }
      return 20;
    }

    function autumnEquinoxDay(year) {
      if (year >= 1980 && year <= 2099) {
        return Math.floor(23.2488 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
      }
      return 23;
    }

    function getHeading(post) {
      if (post.title && post.title.trim()) {
        return createPreview(post.title.trim(), 60);
      }

      const body = post.body.trim();
      if (!body) return "無題の投稿";

      return createPreview(body.replace(/\s+/g, " "), 60);
    }

    function createPreview(text, maxLength) {
      const normalized = String(text || "").trim();

      if (normalized.length <= maxLength) {
        return normalized;
      }

      return normalized.slice(0, maxLength) + "…";
    }

    function formatDateTime(isoString) {
      const date = new Date(isoString);

      if (Number.isNaN(date.getTime())) {
        return "日時不明";
      }

      const yyyy = date.getFullYear();
      const mm = pad2(date.getMonth() + 1);
      const dd = pad2(date.getDate());
      const hh = pad2(date.getHours());
      const min = pad2(date.getMinutes());

      return yyyy + "年" + mm + "月" + dd + "日 " + hh + ":" + min;
    }

    function formatDateKey(dateKey) {
      const parts = dateKey.split("-");
      if (parts.length !== 3) return dateKey;
      return parts[0] + "年" + Number(parts[1]) + "月" + Number(parts[2]) + "日";
    }

    function formatMonthKey(monthKey) {
      const parts = monthKey.split("-");
      if (parts.length !== 2) return monthKey;
      return parts[0] + "年" + Number(parts[1]) + "月";
    }

    function parseDateKey(dateKey) {
      const parts = dateKey.split("-").map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function toDateKey(date) {
      return [
        date.getFullYear(),
        pad2(date.getMonth() + 1),
        pad2(date.getDate())
      ].join("-");
    }

    function toMonthKey(date) {
      return [
        date.getFullYear(),
        pad2(date.getMonth() + 1)
      ].join("-");
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function createId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }

      return "post-" + Date.now() + "-" + Math.random().toString(36).slice(2);
    }

    function clearElement(element) {
      while (element.firstChild) {
        element.removeChild(element.firstChild);
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("is-visible");

      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(function () {
        toast.classList.remove("is-visible");
      }, 2200);
    }
  </script>
